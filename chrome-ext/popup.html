<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      height: 400px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    h2 {
      font-size: 16px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }
    .metric-card {
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .metric-value {
      font-size: 24px;
      font-weight: 700;
      color: #10b981;
    }
    .settings-group {
      margin-top: 8px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .setting-row label {
      cursor: pointer;
      font-weight: 500;
    }
    .budget-input-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .budget-input {
      width: 60px;
      padding: 4px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      text-align: right;
    }
    .btn-clear {
      width: 100%;
      background-color: #111827;
      color: #ffffff;
      border: none;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background-color 0.15s;
    }
    .btn-clear:hover {
      background-color: #374151;
    }
  </style>
</head>
<body>
  <div>
    <h2>MyTokenCost Tracker</h2>
    
    <div class="metric-card">
      <div class="metric-label">Cumulative Spend</div>
      <div id="cost-display" class="metric-value">$0.0000</div>
      <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: #4b5563;">
        <span>Tokens: <strong id="token-display">0</strong></span>
        <span>Model: <strong id="model-display">None</strong></span>
      </div>
    </div>

    <div class="settings-group">
      <div class="setting-row">
        <span><strong>Tracking Providers:</strong></span>
      </div>
      <div class="setting-row">
        <label><input type="checkbox" id="chk-openai" checked> OpenAI</label>
        <label><input type="checkbox" id="chk-anthropic" checked> Anthropic</label>
        <label><input type="checkbox" id="chk-google" checked> Google</label>
      </div>
      
      <div class="setting-row" style="margin-top: 12px;">
        <label for="num-budget"><strong>Daily Budget Limit ($):</strong></label>
        <div class="budget-input-container">
          <span>$</span>
          <input type="number" id="num-budget" class="budget-input" value="10.00" step="0.01" min="0.01">
        </div>
      </div>
    </div>
  </div>

  <button id="btn-reset" class="btn-clear">Reset All Metrics</button>

  <script src="popup.js"></script>
</body>
</html>
